services:
  postal-db:
    image: mariadb:10.11
    container_name: postal-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${POSTAL_DB_PASS}
      MYSQL_DATABASE: ${POSTAL_DB_NAME}
      MYSQL_USER: ${POSTAL_DB_USER}
      MYSQL_PASSWORD: ${POSTAL_DB_PASS}
    volumes:
      - postal-db-data:/var/lib/mysql

  postal-rabbit:
    image: rabbitmq:3.13-management
    container_name: postal-rabbit
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${POSTAL_RABBIT_USER}
      RABBITMQ_DEFAULT_PASS: ${POSTAL_RABBIT_PASS}
    volumes:
      - postal-rabbit-data:/var/lib/rabbitmq

  postal:
    image: ghcr.io/postalserver/postal:2.1.0
    container_name: postal
    restart: unless-stopped
    depends_on:
      - postal-db
      - postal-rabbit
    ports:
      - "${POSTAL_WEB_PORT}:5000"
      - "${POSTAL_SMTP_BIND_PORT}:587"
      - "${POSTAL_MTA_BIND_PORT}:25"
    environment:
      POSTAL_HOSTNAME: ${POSTAL_HOSTNAME}
      POSTAL_DB_HOST: postal-db
      POSTAL_DB_NAME: ${POSTAL_DB_NAME}
      POSTAL_DB_USER: ${POSTAL_DB_USER}
      POSTAL_DB_PASS: ${POSTAL_DB_PASS}
      POSTAL_RABBITMQ_HOST: postal-rabbit
      POSTAL_RABBITMQ_USER: ${POSTAL_RABBIT_USER}
      POSTAL_RABBITMQ_PASS: ${POSTAL_RABBIT_PASS}
      POSTAL_SMTP_PORT: ${POSTAL_SMTP_PORT}
      POSTAL_SECRET_KEY: ${POSTAL_SECRET_KEY}
    volumes:
      - postal-data:/opt/postal/data
      - postal-config:/config

volumes:
  postal-db-data:
  postal-rabbit-data:
  postal-data:
  postal-config:
