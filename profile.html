<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Still In Queue · Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #020617;
      --bg-2: #0b132a;
      --card: rgba(15, 23, 42, 0.85);
      --line: rgba(148, 163, 184, 0.35);
      --text: #f8fbff;
      --muted: #9fb0d9;
      --ok: #22c55e;
      --warn: #fb923c;
      --blue: #38bdf8;
      --yellow: #facc15;
      --radius: 1.1rem;
      --pill: 999px;
      --font-sans: "Inter", system-ui, sans-serif;
      --font-serif: "Playfair Display", "Times New Roman", serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: var(--font-sans);
      background:
        radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.22), transparent 42%),
        radial-gradient(circle at 90% 90%, rgba(34, 197, 94, 0.2), transparent 45%),
        linear-gradient(140deg, var(--bg-2), var(--bg-1));
      display: grid;
      place-items: center;
      padding: 1.2rem;
    }

    #sparkle-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 50;
      pointer-events: none;
      mix-blend-mode: screen;
      will-change: transform, opacity;
      opacity: 0;
      transition: opacity .18s ease;
    }

    .card {
      width: min(760px, 100%);
      border-radius: 1.4rem;
      border: 1px solid var(--line);
      background: var(--card);
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 64px rgba(2, 6, 23, 0.7);
      padding: 1.4rem;
    }

    .topbar {
      margin-bottom: 1rem;
    }

    .title {
      margin: 0;
      font-family: var(--font-serif);
      font-size: clamp(1.35rem, 3.8vw, 2rem);
      line-height: 1.2;
    }

    .intro {
      margin: 0 0 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.8rem;
      margin-bottom: 1.1rem;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0.8rem 0.9rem;
      background: rgba(10, 16, 34, 0.7);
    }

    .label {
      margin: 0 0 0.35rem;
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.11em;
      color: var(--muted);
    }

    .value {
      margin: 0;
      font-weight: 600;
      word-break: break-word;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-top: 1.1rem;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: var(--pill);
      text-decoration: none;
      color: #09111f;
      background: linear-gradient(90deg, var(--blue), #4ade80, var(--yellow));
      padding: 0.6rem 1rem;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .btn.secondary {
      background: rgba(10, 16, 34, 0.8);
      color: var(--text);
      border: 1px solid var(--line);
      letter-spacing: 0.04em;
    }

    #profileMessage {
      min-height: 1.2rem;
      color: var(--muted);
      margin: 0;
      font-size: 0.84rem;
    }

    @media (max-width: 640px) {
      .card { padding: 1rem; }
      .actions { flex-direction: column; }
      .btn, .btn.secondary { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>
  <canvas id="sparkle-canvas" aria-hidden="true"></canvas>

  <main class="card">
    <div class="topbar">
      <h1 class="title">Your Still In Queue Profile</h1>
    </div>

    <p class="intro">You are now signed in. This page is personalized from your backend account record.</p>

    <section class="grid">
      <article class="item">
        <p class="label">Full Name</p>
        <p id="profileName" class="value">Loading...</p>
      </article>
      <article class="item">
        <p class="label">Email</p>
        <p id="profileEmail" class="value">Loading...</p>
      </article>
      <article class="item">
        <p class="label">Email Verification</p>
        <p id="profileVerified" class="value">Loading...</p>
      </article>
      <article class="item">
        <p class="label">Member Since</p>
        <p id="profileCreatedAt" class="value">Loading...</p>
      </article>
      <article class="item">
        <p class="label">Membership Type</p>
        <p id="profileMembershipType" class="value">Paid</p>
      </article>
      <article class="item">
        <p class="label">Active Session Since</p>
        <p id="profileSessionSince" class="value">Loading...</p>
      </article>
    </section>

    <p id="profileMessage"></p>

    <div class="actions">
      <a class="btn" href="agents.html">Go To AI Agents</a>
      <button id="logoutBtn" class="btn secondary" type="button">Log Out</button>
    </div>
  </main>

  <script>
  (() => {
    const HONOR_REDUCED_MOTION = false;
    if (document.documentElement.dataset.sparkles === "off") return;
    if (HONOR_REDUCED_MOTION && matchMedia("(prefers-reduced-motion: reduce)").matches) return;

    const canvas = document.getElementById("sparkle-canvas");
    const ctx = canvas.getContext("2d", { alpha: true });
    Object.assign(canvas.style, {
      mixBlendMode: "screen",
      willChange: "transform",
      pointerEvents: "none",
      position: "fixed",
      inset: "0",
      zIndex: "50",
      width: "100%",
      height: "100%"
    });

    const state = { w: 0, h: 0, dpr: Math.min(2, Math.max(1, window.devicePixelRatio || 1)) };
    function resize() {
      state.w = canvas.clientWidth | 0;
      state.h = canvas.clientHeight | 0;
      canvas.width = Math.max(1, state.w * state.dpr);
      canvas.height = Math.max(1, state.h * state.dpr);
      ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
    }
    resize();
    addEventListener("resize", resize);

    const COLORS = ["#3b82f6", "#22c55e", "#facc15", "#fb923c"];
    const SILVER = "#e5e7eb";

    const STEP = 4;
    const PER_STEP = 4;
    const POS_JIT = 12;
    const POS_JIT_PCT = 0.40;

    const LIFE_MIN = 900;
    const LIFE_VAR = 600;
    const FRICTION = 0.992;
    const GRAVITY = 0.007;
    const SPEED_JIT = 1.0;
    const NOISE = 0.035;

    const STAR_CHANCE = 0.08;
    const STAR_SCALES = [0.9, 1.15, 1.4, 2.3];

    const IDLE_DELAY_MS = 120;
    const IDLE_EVERY_MS = 55;
    const IDLE_COUNT = 2;
    const IDLE_SPREAD = 18;
    const IDLE_SPEED = 0.5;

    const MAX = 620;

    const P = new Array(MAX).fill(null);
    let head = 0;
    function addParticle(x, y, vx, vy, color, type = "dot", extra = {}) {
      const life = LIFE_MIN + Math.random() * LIFE_VAR;
      const base = (type === "dot") ? (1.2 + Math.random() * 2.6) : (1.0 + Math.random() * 1.5);
      const starScale = (type === "star") ? STAR_SCALES[(Math.random() * STAR_SCALES.length) | 0] : 1;
      P[head] = { x, y, vx, vy, life, ttl: life, base, color, type, starScale, ...extra };
      head = (head + 1) % MAX;
    }

    const hexA = (hex, a) => {
      const n = hex.replace("#", "");
      const v = parseInt(n.length === 3 ? n.split("").map((c) => c + c).join("") : n, 16);
      const r = (v >> 16) & 255;
      const g = (v >> 8) & 255;
      const b = v & 255;
      return `rgba(${r},${g},${b},${a})`;
    };

    function drawBubble(x, y, r, color, alpha) {
      const g = ctx.createRadialGradient(x, y, 0, x, y, r);
      g.addColorStop(0.00, hexA(color, Math.min(1, alpha * 0.85)));
      g.addColorStop(0.50, hexA(color, Math.min(1, alpha * 0.35)));
      g.addColorStop(1.00, hexA(color, 0));
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawStar5(x, y, outerR, alpha) {
      const innerR = outerR * 0.5;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(-Math.PI / 2);
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a0 = (i * 2 * Math.PI) / 5;
        const a1 = a0 + Math.PI / 5;
        ctx.lineTo(Math.cos(a0) * outerR, Math.sin(a0) * outerR);
        ctx.lineTo(Math.cos(a1) * innerR, Math.sin(a1) * innerR);
      }
      ctx.closePath();
      ctx.fillStyle = hexA(SILVER, alpha);
      ctx.shadowColor = SILVER;
      ctx.shadowBlur = 14;
      ctx.fill();
      ctx.restore();
    }

    function spawnAt(x, y, segLen, pressed) {
      const now = performance.now();
      const baseIndex = Math.floor(now / 140) % COLORS.length;
      const count = PER_STEP + (pressed ? 1 : 0);
      const jitterR = POS_JIT + segLen * POS_JIT_PCT;

      for (let i = 0; i < count; i++) {
        const angPos = Math.random() * Math.PI * 2;
        const jx = Math.cos(angPos) * (Math.random() * jitterR);
        const jy = Math.sin(angPos) * (Math.random() * jitterR);

        const angVel = Math.random() * Math.PI * 2;
        const pow = Math.random() * SPEED_JIT;
        const vx = Math.cos(angVel) * pow;
        const vy = Math.sin(angVel) * pow - 0.02;

        const color = COLORS[(baseIndex + i) % COLORS.length];
        addParticle(x + jx, y + jy, vx, vy, color, "dot");
      }

      if (Math.random() < STAR_CHANCE) {
        const angVel = Math.random() * Math.PI * 2;
        const vx = Math.cos(angVel) * 0.28;
        const vy = Math.sin(angVel) * 0.28 - 0.05;
        addParticle(x, y, vx, vy, SILVER, "star");
      }
    }

    function sampleSpawns(x0, y0, x1, y1, pressed) {
      if (x0 == null || y0 == null) { spawnAt(x1, y1, STEP, pressed); return; }
      const dx = x1 - x0;
      const dy = y1 - y0;
      const dist = Math.hypot(dx, dy);
      const steps = Math.max(1, Math.floor(dist / STEP));
      const segLen = dist / steps;
      for (let s = 1; s <= steps; s++) {
        const t = s / steps;
        spawnAt(x0 + dx * t, y0 + dy * t, segLen, pressed);
      }
    }

    let last = null;
    let down = false;
    let lastMoveAt = performance.now();
    let idleAcc = 0;

    addEventListener("pointerdown", (e) => {
      down = true;
      last = { x: e.clientX, y: e.clientY };
      lastMoveAt = performance.now();
      spawnAt(e.clientX, e.clientY, STEP, true);
      canvas.style.opacity = "1";
    }, { passive: true });

    addEventListener("pointerup", () => { down = false; last = null; }, { passive: true });

    addEventListener("pointermove", (e) => {
      canvas.style.opacity = "1";
      const list = (typeof e.getCoalescedEvents === "function") ? e.getCoalescedEvents() : null;
      if (list && list.length) {
        for (const ev of list) {
          if (last) sampleSpawns(last.x, last.y, ev.clientX, ev.clientY, down);
          else spawnAt(ev.clientX, ev.clientY, STEP, down);
          last = { x: ev.clientX, y: ev.clientY };
        }
      } else {
        const x = e.clientX;
        const y = e.clientY;
        if (last) sampleSpawns(last.x, last.y, x, y, down);
        else spawnAt(x, y, STEP, down);
        last = { x, y };
      }
      lastMoveAt = performance.now();
    }, { passive: true });

    function idleEmit(dt) {
      if (!last) return;
      const since = performance.now() - lastMoveAt;
      if (since < IDLE_DELAY_MS) { idleAcc = 0; return; }
      idleAcc += dt;
      while (idleAcc >= IDLE_EVERY_MS) {
        idleAcc -= IDLE_EVERY_MS;
        for (let i = 0; i < IDLE_COUNT; i++) {
          const ang = Math.random() * Math.PI * 2;
          const r = Math.random() * IDLE_SPREAD;
          const x = last.x + Math.cos(ang) * r;
          const y = last.y + Math.sin(ang) * r;
          const vang = Math.random() * Math.PI * 2;
          const vpow = Math.random() * IDLE_SPEED;
          const vx = Math.cos(vang) * vpow;
          const vy = Math.sin(vang) * vpow - 0.02;
          const color = COLORS[(Math.floor(performance.now() / 180)) % COLORS.length];
          addParticle(x, y, vx, vy, color, "dot");
        }
        if (Math.random() < 0.12) {
          const vx = (Math.random() - 0.5) * 0.3;
          const vy = (Math.random() - 0.8) * 0.3;
          addParticle(last.x, last.y, vx, vy, SILVER, "star");
        }
      }
    }

    let lastFrame = performance.now();
    function tick(now) {
      const dt = now - lastFrame;
      lastFrame = now;

      ctx.clearRect(0, 0, state.w, state.h);
      idleEmit(dt);

      for (let i = 0; i < MAX; i++) {
        const p = P[i];
        if (!p || p.ttl <= 0) continue;

        p.vx += (Math.random() - 0.5) * NOISE;
        p.vy += (Math.random() - 0.5) * NOISE;
        p.vx *= FRICTION;
        p.vy = p.vy * FRICTION + GRAVITY;
        p.x += p.vx;
        p.y += p.vy;

        p.ttl -= dt;
        const t = Math.max(0, p.ttl / p.life);
        const alpha = t;
        const r = p.base * (0.7 + 1.8 * (1 - t));

        if (p.type === "dot") {
          drawBubble(p.x, p.y, r, p.color, alpha);
        } else {
          drawStar5(p.x, p.y, r * p.starScale, Math.min(1, alpha * 0.9));
        }
      }

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    document.addEventListener("visibilitychange", () => { lastFrame = performance.now(); });
  })();
  </script>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const backendFromQuery = params.get("backend");
      const backendFromStorage = window.localStorage.getItem("sq_backend_url");
      const defaultPublicBackend = "https://sweet-teeth-beam.loca.lt";
      const backendUrl = backendFromQuery || backendFromStorage || defaultPublicBackend;

      if (backendFromQuery) {
        window.localStorage.setItem("sq_backend_url", backendFromQuery);
      }

      const token = window.localStorage.getItem("sq_auth_token");
      const messageEl = document.getElementById("profileMessage");
      const nameEl = document.getElementById("profileName");
      const emailEl = document.getElementById("profileEmail");
      const verifiedEl = document.getElementById("profileVerified");
      const createdAtEl = document.getElementById("profileCreatedAt");
      const membershipTypeEl = document.getElementById("profileMembershipType");
      const sessionSinceEl = document.getElementById("profileSessionSince");

      function formatDate(value) {
        if (!value) return "-";
        const dateValue = new Date(value);
        return Number.isNaN(dateValue.getTime()) ? "-" : dateValue.toLocaleString();
      }

      function logout() {
        window.localStorage.removeItem("sq_auth_token");
        window.localStorage.removeItem("sq_auth_email");
        window.localStorage.removeItem("sq_auth_session_started_at");
        const backend = encodeURIComponent(backendUrl);
        window.location.href = `login.html?backend=${backend}`;
      }

      document.getElementById("logoutBtn").addEventListener("click", logout);

      if (!token) {
        logout();
        return;
      }

      const existingSessionStart = window.localStorage.getItem("sq_auth_session_started_at");
      if (!existingSessionStart) {
        window.localStorage.setItem("sq_auth_session_started_at", new Date().toISOString());
      }
      sessionSinceEl.textContent = formatDate(window.localStorage.getItem("sq_auth_session_started_at"));
      membershipTypeEl.textContent = "Paid";

      async function loadProfile() {
        try {
          const response = await fetch(`${backendUrl}/api/auth/me`, {
            method: "GET",
            headers: {
              Authorization: `Bearer ${token}`,
            },
          });

          if (!response.ok) {
            messageEl.style.color = "#fb923c";
            messageEl.textContent = "Session expired. Please sign in again.";
            logout();
            return;
          }

          const profile = await response.json();
          nameEl.textContent = profile.name || "-";
          emailEl.textContent = profile.email || "-";
          verifiedEl.textContent = profile.email_verified ? "Verified" : "Not verified";
          createdAtEl.textContent = formatDate(profile.created_at);
          messageEl.style.color = "#9fb0d9";
          messageEl.textContent = "Profile loaded from backend.";
        } catch (_err) {
          messageEl.style.color = "#fb923c";
          messageEl.textContent = "Unable to load profile right now.";
        }
      }

      loadProfile();
    })();
  </script>
</body>
</html>
