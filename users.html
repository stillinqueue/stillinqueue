<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Still In Queue · Users Admin</title>
  <style>
    :root {
      --bg: #040816;
      --bg2: #0e1732;
      --card: rgba(15, 23, 42, 0.86);
      --line: rgba(148, 163, 184, 0.35);
      --text: #eef4ff;
      --muted: #9db0d6;
      --ok: #22c55e;
      --warn: #fb923c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 0 0, rgba(59, 130, 246, 0.24), transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(34, 197, 94, 0.2), transparent 42%),
        linear-gradient(150deg, var(--bg2), var(--bg));
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif;
      padding: 1rem;
    }
    .panel {
      max-width: 1080px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.45);
      padding: 1rem;
    }
    h1 { margin: 0 0 0.5rem; font-size: 1.35rem; }
    .sub { margin: 0 0 1rem; color: var(--muted); font-size: 0.9rem; }
    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.65rem;
      margin-bottom: 1rem;
    }
    .field {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(8, 13, 32, 0.75);
      padding: 0.55rem 0.7rem;
      color: var(--text);
      width: 100%;
    }
    .actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: linear-gradient(90deg, #38bdf8, #4ade80, #facc15);
      color: #041322;
      padding: 0.55rem 0.95rem;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
    }
    button.secondary {
      background: rgba(8, 13, 32, 0.75);
      color: var(--text);
    }
    .status {
      margin: 0.8rem 0;
      padding: 0.5rem 0.65rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      color: var(--muted);
      font-size: 0.82rem;
    }
    .dot { width: 0.55rem; height: 0.55rem; border-radius: 50%; background: #94a3b8; }
    .status.online .dot { background: var(--ok); box-shadow: 0 0 8px rgba(34, 197, 94, 0.55); }
    .status.offline .dot { background: var(--warn); box-shadow: 0 0 8px rgba(251, 146, 60, 0.55); }
    .meta { margin: 0.6rem 0; color: var(--muted); font-size: 0.85rem; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td {
      text-align: left;
      padding: 0.65rem;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      font-size: 0.85rem;
    }
    th { color: var(--muted); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; font-size: 0.75rem; }
    td code {
      background: rgba(2, 6, 23, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.25);
      padding: 0.1rem 0.35rem;
      border-radius: 8px;
      color: #dbeafe;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Users Admin</h1>
    <p class="sub">View accounts created from the website. This page is available only to admin users.</p>

    <div class="row">
      <input id="backendUrl" class="field" type="text" placeholder="Backend URL" />
    </div>

    <div class="actions">
      <button id="loadBtn" type="button">Load Users</button>
      <button id="saveBtn" type="button" class="secondary">Save Settings</button>
    </div>

    <div id="apiStatus" class="status">
      <span class="dot" aria-hidden="true"></span>
      <span id="apiStatusText">Checking API...</span>
    </div>

    <p id="meta" class="meta">Waiting to load users...</p>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>Name</th>
            <th>Verified</th>
            <th>Membership</th>
            <th>Payment</th>
            <th>Admin</th>
            <th>Created At</th>
          </tr>
        </thead>
        <tbody id="usersBody">
          <tr><td colspan="7">No data loaded yet.</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    (function () {
      const backendInput = document.getElementById("backendUrl");
      const statusEl = document.getElementById("apiStatus");
      const statusText = document.getElementById("apiStatusText");
      const metaEl = document.getElementById("meta");
      const usersBody = document.getElementById("usersBody");

      const q = new URLSearchParams(window.location.search);
      const backendFromQuery = q.get("backend");
      const backendFromStorage = localStorage.getItem("sq_backend_url");
      const defaultBackend = "https://sweet-teeth-beam.loca.lt";
      const backend = backendFromQuery || backendFromStorage || defaultBackend;
      const authToken = localStorage.getItem("sq_auth_token") || "";

      backendInput.value = backend;

      function setStatus(online, text) {
        statusEl.classList.remove("online", "offline");
        statusEl.classList.add(online ? "online" : "offline");
        statusText.textContent = text;
      }

      function saveSettings() {
        localStorage.setItem("sq_backend_url", backendInput.value.trim());
      }

      function formatDate(value) {
        if (!value) return "-";
        const d = new Date(value);
        return Number.isNaN(d.getTime()) ? value : d.toLocaleString();
      }

      async function loadUsers() {
        const backendUrl = backendInput.value.trim();
        if (!backendUrl) {
          setStatus(false, "Backend URL required");
          return;
        }

        if (!authToken) {
          setStatus(false, "Not signed in");
          metaEl.textContent = "Please sign in with an admin account.";
          window.location.href = `login.html?backend=${encodeURIComponent(backendUrl)}`;
          return;
        }

        saveSettings();

        const headers = {
          "Content-Type": "application/json",
          Authorization: `Bearer ${authToken}`,
        };

        try {
          const meRes = await fetch(`${backendUrl}/api/auth/me`, { headers });
          if (!meRes.ok) {
            metaEl.textContent = "Session expired. Please sign in again.";
            window.location.href = `login.html?backend=${encodeURIComponent(backendUrl)}`;
            return;
          }

          const me = await meRes.json();
          if (!me.is_admin) {
            metaEl.textContent = "This page is only for admin users.";
            usersBody.innerHTML = '<tr><td colspan="7">Admin access required.</td></tr>';
            window.location.href = `profile.html?backend=${encodeURIComponent(backendUrl)}`;
            return;
          }

          const healthRes = await fetch(`${backendUrl}/api/auth/health`, { headers });
          setStatus(healthRes.ok, healthRes.ok ? "Auth API online" : "Auth API unreachable");

          const [countRes, usersRes] = await Promise.all([
            fetch(`${backendUrl}/api/auth/users/count`, { headers }),
            fetch(`${backendUrl}/api/auth/users`, { headers }),
          ]);

          if (!countRes.ok || !usersRes.ok) {
            const errPayload = await usersRes.json().catch(() => ({}));
            metaEl.textContent = errPayload.detail || "Unable to fetch users. Admin privileges required.";
            usersBody.innerHTML = '<tr><td colspan="7">Failed to load users.</td></tr>';
            return;
          }

          const countData = await countRes.json();
          const usersData = await usersRes.json();

          metaEl.textContent = `Total users: ${countData.count}`;
          if (!Array.isArray(usersData) || usersData.length === 0) {
            usersBody.innerHTML = '<tr><td colspan="7">No users yet.</td></tr>';
            return;
          }

          usersBody.innerHTML = usersData
            .map((user) => {
              const verified = user.email_verified ? "Yes" : "No";
              const admin = user.is_admin ? "Yes" : "No";
              return `\n<tr>\n<td><code>${user.email}</code></td>\n<td>${user.name || "-"}</td>\n<td>${verified}</td>\n<td>${user.membership_type || "Paid"}</td>\n<td>${user.payment_status || "active"}</td>\n<td>${admin}</td>\n<td>${formatDate(user.created_at)}</td>\n</tr>`;
            })
            .join("");
        } catch (_err) {
          setStatus(false, "Auth API offline");
          metaEl.textContent = "Network error while loading users.";
          usersBody.innerHTML = '<tr><td colspan="7">Network error.</td></tr>';
        }
      }

      document.getElementById("loadBtn").addEventListener("click", loadUsers);
      document.getElementById("saveBtn").addEventListener("click", () => {
        saveSettings();
        metaEl.textContent = "Settings saved.";
      });

      loadUsers();
    })();
  </script>
</body>
</html>
